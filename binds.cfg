//stock non class-specific binds
//Made with cfg.tf - custom Team Fortress 2 config generator


exec tweaks/tabgraph

//class selection
bind "KP_END" "join_class scout"
bind "KP_DOWNARROW" "join_class soldier"
bind "KP_PGDN" "join_class pyro"
bind "KP_LEFTARROW" "join_class demoman"
bind "KP_5" "join_class heavyweapons"
bind "KP_RIGHTARROW" "join_class engineer"
bind "KP_HOME" "join_class medic"
bind "KP_UPARROW" "join_class sniper"
bind "KP_PGUP" "join_class spy"

//demo fast forward
alias "demostate" "demofast"
alias "demofast" "demo_timescale 6;alias demostate demonormal"
alias "demonormal" "demo_timescale 1;alias demostate demofast"
bind mouse4 "spectate; demostate"

//chat binds
bind p "say Rahmed :  hi milf are u in my area?"


//resets
hud_combattext_batching 1
bind g +taunt
bindtoggle \ "r_drawviewmodel"
bind mouse2 +attack2
bind c "voicemenu 0 6"
bind x "voicemenu 0 1"
bind shift "+use_action_slot_item"
r_drawtracers_firstperson 1
cl_hud_playerclass_use_playermodel 0





