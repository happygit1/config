//soldier settings
//Made with cfg.tf - custom Team Fortress 2 config generator

exec binds

r_drawviewmodel 0
bind q "slot1; r_drawviewmodel 0"
bind e "slot3; r_drawviewmodel 1"
bind f "slot2; r_drawviewmodel 0"
tf_use_min_viewmodels 1
viewmodel_fov 70

bind g taunt
alias brew "taunt_by_name Taunt: Fresh Brewed Victory;"
alias +changet "bind g brew"
alias -changet "bind g taunt"
bind shift "+changet; +use_action_slot_item"

bind "mouse2" "+ct"
alias "+ct" "+duck; bind mouse1 +ct2"
alias "-ct" "-duck; bind mouse1 +attack; -jump; -attack"
alias "+ct2" "-duck; +attack; +jump"
alias "-ct2" "+duck; -attack; -jump; bind mouse1 +ct3"
alias "+ct3" "+duck; +jump; +attack"
alias "-ct3" "-jump; -attack"