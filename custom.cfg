//tweaks and custom settings
//Made with cfg.tf - custom Team Fortress 2 config generator

exec tweaks/null
exec tweaks/confilter
exec tweaks/tabgraph
///---

//viewmodel
alias "+viewmodel" "r_Drawviewmodel 1"
alias "-viewmodel" "r_Drawviewmodel 0"
bind \ "+viewmodel"

alias dc disconnect

//maps
alias process "rcon changelevel cp_process_f12"
alias sunshine "rcon changelevel cp_sunshine"
alias metal "rcon changelevel cp_metalworks_f5"
alias snake "rcon changelevel cp_snakewater_final1"
alias gully "rcon changelevel cp_gullywash_f9"
alias reckoner "rcon changelevel cp_reckoner_rc6"
alias product "rcon changelevel koth_product_final"
alias bagel "rcon changelevel koth_bagel_rc11"
alias sultry "rcon changelevel cp_sultry_b8a"

//gamemodes
alias 5cp "rcon exec etf2l_6v6_5cp"
alias koth "rcon exec etf2l_6v6_koth"

//whitelists
alias rgl "rcon tftrue_whitelist_id 13531"
alias etf2l "rcon tftrue_whitelist_id 13999"

//crosshairs
alias venom "cl_Crosshair_file ''"
alias default "cl_crosshair_file default"
alias circle "cl_crosshair_file crosshair3"
alias cross "cl_crosshair_file crosshair7"
alias dot "cl_crosshair_file crosshair5"
 
//colours
alias white "cl_Crosshair_red 255;cl_Crosshair_blue 255;cl_Crosshair_green 255"
alias green "cl_crosshair_red 0;cl_crosshair_blue 0;cl_crosshair_green 255"
alias magenta "cl_crosshair_red 255; cl_Crosshair_blue 255; cl_Crosshair_green 0"
alias yellow "cl_Crosshair_red 255;cl_Crosshair_blue 0;cl_Crosshair_green 255"

alias "vms" "r_drawviewmodel 1;bind q slot1;bind f slot2;bind e slot3"

//walkway
sv_allow_point_servercommand always


//Lighting/texture settings
mat_phong 1
mat_specular 1
mat_bumpmap 1
r_rimlight 0
mat_filtertextures 1
fps_max 0
///---

//shameless promotion
echo "-----             Thanks for using CFG.TF             -----"
echo "----- Create your own custom config at https://cfg.tf -----"