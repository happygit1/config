//medic settings
//Made with cfg.tf - custom Team Fortress 2 config generator

exec binds

r_drawviewmodel 0
bind q "slot1; r_drawviewmodel 0; tf_use_min_viewmodels 0; viewmodel_fov 70"
bind e "slot3; r_drawviewmodel 1; tf_use_min_viewmodels 0; viewmodel_fov 90"
bind f "slot2; r_drawviewmodel 0; tf_use_min_viewmodels 0; viewmodel_fov 20"

alias "autocall_default" "hud_medicautocallersthreshold 75.730003/Custom Threshold"
alias "autocall_all" "hud_medicautocallersthreshold 150"
alias "+radar" "autocall_all"
alias "-radar" "autocall_default"
bind x "+radar

bind g taunt